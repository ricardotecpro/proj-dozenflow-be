# ===============================
# GLOBAL CONFIGURATION
# ===============================
# Set the default profile to 'dev' for local development.
# This can be overridden by system properties or environment variables in production.
spring.profiles.active=dev

# ===============================
# JPA / FLYWAY
# ===============================
# Flyway (src/main/resources/db/migration) is the single source of truth
# for the schema in every profile, including dev — Hibernate never creates
# or alters tables. Kept here (not in application-dev/-prod) because
# application-prod.properties.example is documentation only: real
# deployments (Render) are gitignored/env-var-driven and never load a
# committed prod properties file, so anything prod actually needs has to
# live in this shared file or be set as an env var (see README).
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true

# ===============================
# CORS CONFIGURATION
# ===============================
# Comma-separated list of allowed origin patterns for CORS ("*" wildcards
# allowed, see WebConfig). Includes local development, the production
# frontend URL, and Netlify's deploy-preview/branch-preview subdomains.
cors.allowed-origins=http://localhost:4200,https://dozenflow.netlify.app,https://*--dozenflow.netlify.app

# ===============================
# ACTUATOR
# ===============================
# Only expose the health endpoint; everything else (env, beans, etc.) stays off.
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=never
