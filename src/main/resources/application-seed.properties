# ===============================
# SEED PROFILE (opt-in, dev-only)
# ===============================
# Activate together with `dev` to populate the H2 database with sample
# tasks for manual/visual testing:
#   SPRING_PROFILES_ACTIVE=dev,seed ./mvnw spring-boot:run
# Never active in tests (no @ActiveProfiles references it) or in
# production (Postgres — this only runs for the embedded dev database).
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:data-seed.sql
